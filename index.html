<meta name="generator" content="Perplexity Computer">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSL Innovation Office — Roofing Contractor Pipeline</title>

<!-- Fonts from Fontshare -->
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOP CONTROL BAR -->
  <header id="controlBar">
    <div class="control-left">
      <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-label="CSL Logo">
        <rect x="2" y="4" width="8" height="16" rx="2" fill="#4F98A3"/>
        <rect x="12" y="8" width="10" height="8" rx="2" fill="#6DAA45"/>
        <circle cx="6" cy="12" r="2" fill="#fff"/>
      </svg>
      <div class="control-title">
        <span class="title-main">CSL Innovation Office</span>
        <span class="title-sub">Roofing Contractor Study</span>
      </div>
    </div>
    <div class="control-center">
      <span id="pipelineStatusLabel" class="status-badge idle">Pipeline Idle</span>
    </div>
    <div class="control-right">
      <div class="speed-group">
        <button class="speed-btn" data-speed="0.5">0.5x</button>
        <button class="speed-btn active" data-speed="1">1x</button>
        <button class="speed-btn" data-speed="2">2x</button>
      </div>
      <button id="btnPause" class="ctrl-btn" title="Pause">
        <i data-lucide="pause" width="16" height="16"></i>
      </button>
      <button id="btnRun" class="ctrl-btn primary" title="Run Pipeline">
        <i data-lucide="play" width="16" height="16"></i>
        <span>Run Pipeline</span>
      </button>
      <button id="btnReset" class="ctrl-btn" title="Reset">
        <i data-lucide="rotate-ccw" width="16" height="16"></i>
      </button>
    </div>
  </header>

  <!-- AGENT STATUS BAR -->
  <div id="agentBar">
    <!-- Populated by JS -->
  </div>

  <!-- MAIN AREA -->
  <div id="mainArea">
    <!-- CANVAS -->
    <canvas id="officeCanvas"></canvas>

    <!-- HTML Overlays: speech bubbles, agent labels -->
    <div id="overlayLayer">
      <!-- Agent labels and speech bubbles injected here by JS -->
    </div>

    <!-- SIDE PANEL -->
    <aside id="sidePanel">
      <div class="panel-header">
        <h2 id="panelPhaseTitle">Pipeline Overview</h2>
        <p id="panelPhaseDesc">Click "Run Pipeline" to begin the ODI Innovation Pipeline.</p>
      </div>
      <div id="panelMetrics" class="panel-metrics">
        <!-- Metric cards injected by JS -->
      </div>
      <div id="panelTwins" class="panel-twins" style="display:none;">
        <h3>Digital Twin Panel</h3>
        <div id="twinsList"></div>
      </div>
      <div id="panelBriefs" class="panel-briefs" style="display:none;">
        <h3>Top Concept Briefs</h3>
        <div id="briefsList"></div>
      </div>
    </aside>
  </div>

  <!-- LOG TICKER -->
  <div id="logTicker">
    <div class="ticker-icon"><i data-lucide="terminal" width="14" height="14"></i></div>
    <div id="tickerContent" class="ticker-scroll">
      <span class="log-entry"><span class="log-time">18:33</span> System initialized. Agents standing by.</span>
    </div>
  </div>

  <!-- FOOTER -->
  <footer id="appFooter">
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
